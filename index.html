<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirigiendo - Esteban López</title>
<meta name="description" content="Redirigiendo a la nueva hoja de vida de Esteban Manuel López Rivero">
<meta http-equiv="refresh" content="7;url=https://hoja-de-vida-esteban.web.app/">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; }
#three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
.content { position: relative; z-index: 1; text-align: center; padding: 20px; }
h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p { font-size: 1.1rem; color: rgba(255,255,255,0.6); margin-bottom: 30px; letter-spacing: 2px; }
.loader { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
.loader span { width: 10px; height: 10px; border-radius: 50%; background: #667eea; animation: bounce 1.4s infinite ease-in-out both; }
.loader span:nth-child(1) { animation-delay: -0.32s; }
.loader span:nth-child(2) { animation-delay: -0.16s; }
.loader span:nth-child(3) { animation-delay: 0s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
.countdown { font-size: 0.9rem; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
.countdown a { color: #667eea; text-decoration: none; }
.countdown a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="three-canvas"></div>
<div class="content">
  <div class="loader"><span></span><span></span><span></span></div>
  <h1>Redirigiendo</h1>
  <p>Nueva versión de mi Hoja de Vida</p>
  <div class="countdown">
    <span id="counter">7</span> segundos &middot;
    <a href="https://hoja-de-vida-esteban.web.app/">Ir ahora</a>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('three-canvas').appendChild(renderer.domElement);

const particlesGeo = new THREE.BufferGeometry();
const count = 2000;
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);
for (let i = 0; i < count * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 30;
  colors[i] = 0.4 + Math.random() * 0.6;
}
particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particlesGeo, particleMat);
scene.add(particles);

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.001;
  particles.rotation.y = time * 0.1;
  particles.rotation.x = Math.sin(time * 0.05) * 0.1;
  renderer.render(scene, camera);
}
animate();

camera.position.z = 8;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let seconds = 7;
setInterval(() => {
  seconds--;
  document.getElementById('counter').textContent = seconds;
}, 1000);
</script>
</body>
</html>
